name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Run clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          CARGO_VERSION=$(grep '^version' ferrissh/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Release tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version verified: $CARGO_VERSION"

      - name: Check if ferrissh-macros needs publishing
        id: check_macros
        run: |
          LOCAL_VERSION=$(grep '^version' ferrissh-macros/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PUBLISHED=$(cargo search ferrissh-macros --limit 1 2>/dev/null | grep -oP 'ferrissh-macros = "\K[^"]+' || echo "")
          if [ "$LOCAL_VERSION" = "$PUBLISHED" ]; then
            echo "ferrissh-macros v$LOCAL_VERSION already published, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "ferrissh-macros v$LOCAL_VERSION not yet published (crates.io has v$PUBLISHED)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish ferrissh-macros (dry run)
        if: inputs.dry_run == true && steps.check_macros.outputs.skip != 'true'
        working-directory: ./ferrissh-macros
        run: cargo publish --dry-run

      - name: Publish ferrissh (dry run)
        if: inputs.dry_run == true
        working-directory: ./ferrissh
        run: cargo publish --dry-run

      - name: Publish ferrissh-macros
        if: inputs.dry_run != true && steps.check_macros.outputs.skip != 'true'
        working-directory: ./ferrissh-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Wait for crates.io index update
        if: inputs.dry_run != true && steps.check_macros.outputs.skip != 'true'
        run: sleep 30

      - name: Publish ferrissh
        if: inputs.dry_run != true
        working-directory: ./ferrissh
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
